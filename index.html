<!DOCTYPE html>
<!-- made by bigyan -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tripathi Motors — Post Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* made by bigyan */
  :root{
    --blue:#1357C8; --blue-bright:#2E78EE; --blue-deep:#093A86;
    --bg:#080b12; --card:#0f141d; --input-bg:#141b27;
    --border:rgba(46,120,238,0.20); --border-h:rgba(46,120,238,0.50);
    --fg:#eef3fb; --muted:#7d8aa0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(46,120,238,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
  header{position:relative;z-index:10;text-align:center;padding:36px 20px 24px;border-bottom:1px solid var(--border);}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--blue-bright);margin-bottom:8px;opacity:.85;}
  header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,5vw,42px);font-weight:300;letter-spacing:2px;}
  header h1 span{color:var(--blue-bright);font-weight:600;}
  .page{display:none;position:relative;z-index:5;} .page.active{display:block;}
  .fc{max-width:660px;margin:30px auto;padding:0 20px 90px;}
  .slabel{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--blue-bright);margin:26px 0 14px;display:flex;align-items:center;gap:12px;}
  .slabel::after{content:'';flex:1;height:1px;background:var(--border);}

  .upload-zone{border:1.5px dashed var(--border-h);border-radius:14px;background:var(--card);padding:34px 20px;text-align:center;cursor:pointer;transition:all .3s;touch-action:manipulation;}
  .upload-zone:hover{border-color:var(--blue-bright);background:var(--input-bg);box-shadow:0 0 24px rgba(46,120,238,.12);}
  .upload-icon{font-size:32px;margin-bottom:10px;opacity:.5;}
  .upload-text{font-size:14px;color:var(--muted);font-weight:400;}
  .upload-text strong{color:var(--blue-bright);font-weight:600;}
  .hint{font-size:11px;color:var(--muted);margin-top:5px;opacity:.7;}
  #fileInput{display:none;}

  .thumbs{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;}
  .thumb{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:2px solid var(--border);background:var(--card);}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .rm{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(8,11,18,.8);color:#fff;border:none;font-size:13px;line-height:20px;cursor:pointer;padding:0;}
  .thumb .num{position:absolute;bottom:3px;left:4px;font-size:10px;font-weight:700;color:#fff;background:rgba(19,87,200,.85);padding:1px 6px;border-radius:6px;}

  .logo-zone{border:1.5px dashed var(--border-h);border-radius:10px;background:var(--card);padding:14px 16px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:12px;touch-action:manipulation;}
  .logo-zone:hover{border-color:var(--blue-bright);}
  .logo-zone.has-logo{border-style:solid;border-color:var(--blue-bright);}
  .logo-preview{width:44px;height:44px;object-fit:contain;border-radius:6px;display:none;background:#fff;padding:3px;}
  .logo-zone.has-logo .logo-preview{display:block;}
  .logo-zone-text{font-size:13px;color:var(--muted);font-weight:400;} 

  .grid{display:grid;gap:13px;margin-bottom:13px;}
  .g1{grid-template-columns:1fr;} .g2{grid-template-columns:1fr 1fr;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .field label .opt{color:var(--blue-bright);opacity:.8;}
  .field input{background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;font-family:'Montserrat',sans-serif;font-size:14px;color:var(--fg);outline:none;transition:all .25s;}
  .field input:focus{border-color:var(--blue-bright);box-shadow:0 0 0 3px rgba(46,120,238,.14);}
  .field input::placeholder{color:#586679;}
  .field select{background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;font-family:'Montserrat',sans-serif;font-size:14px;color:var(--fg);outline:none;transition:all .25s;cursor:pointer;-webkit-appearance:none;appearance:none;}
  .field select:focus{border-color:var(--blue-bright);box-shadow:0 0 0 3px rgba(46,120,238,.14);}

  .btn-gen{width:100%;margin-top:24px;padding:16px;background:linear-gradient(135deg,var(--blue-deep),var(--blue-bright));border:none;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(46,120,238,.32);touch-action:manipulation;}
  .btn-gen:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(46,120,238,.48);}

  .pc{max-width:860px;margin:30px auto;padding:0 20px 90px;}
  .pactions{display:flex;gap:10px;margin-bottom:22px;align-items:center;flex-wrap:wrap;}
  .btn-back{background:transparent;border:1.5px solid var(--border-h);border-radius:10px;padding:10px 18px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .25s;touch-action:manipulation;}
  .btn-back:hover{border-color:var(--blue-bright);color:var(--blue-bright);}
  .btn-dl{background:linear-gradient(135deg,var(--blue-deep),var(--blue-bright));border:none;border-radius:10px;padding:10px 20px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(46,120,238,.3);touch-action:manipulation;}
  .btn-dl.alt{background:transparent;border:1.5px solid var(--blue-bright);color:var(--blue-bright);box-shadow:none;}
  .btn-dl:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(46,120,238,.45);}
  .btn-dl:disabled{opacity:.45;pointer-events:none;}
  .sizes{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;}
  .sbtn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 13px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;touch-action:manipulation;}
  .sbtn.active,.sbtn:hover{border-color:var(--blue-bright);color:var(--blue-bright);background:var(--input-bg);}

  .pstrip{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px;}
  .pthumb{width:66px;height:66px;border-radius:9px;overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:all .2s;opacity:.6;}
  .pthumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .pthumb.active{border-color:var(--blue-bright);opacity:1;box-shadow:0 0 14px rgba(46,120,238,.3);}

  .cwrap{display:flex;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.45);overflow:hidden;}
  #postCanvas{border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:100%;height:auto;display:block;}
  .cwrap-outer{position:relative;}
  .canvas-loading{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:rgba(8,11,18,.7);border-radius:18px;font-size:13px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .canvas-loading.show{display:flex;}

  @media(max-width:580px){.g2{grid-template-columns:1fr 1fr;}.sizes{margin-left:0;width:100%;}.cwrap{padding:12px;}}
</style>
</head>
<body>

<input type="file" id="fileInput" accept="image/*" multiple>

<header>
  <div class="eyebrow">Marketing App</div>
  <h1>Tripathi <span>Motors</span></h1>
</header>

<div class="page active" id="page1">
  <div class="fc">
    <div class="slabel">Car Photos · upload one or many</div>
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📷</div>
      <div class="upload-text"><strong>Tap to upload</strong> car photos</div>
      <div class="hint">Add several shots of the same car — you can download a post for each · JPG · PNG · WEBP</div>
    </div>
    <div class="thumbs" id="thumbs"></div>


    <div class="slabel">Car Details</div>
    <div class="grid g1">
      <div class="field"><label>Car Title &amp; Model</label>
        <input type="text" id="carTitle"></div>
    </div>
    <div class="grid g1">
      <div class="field"><label>Price</label>
        <input type="text" id="price" inputmode="numeric" oninput="livePrice(this)" onblur="livePrice(this)"></div>
    </div>

    <div class="slabel">Highlights <span style="color:var(--muted);letter-spacing:1px;">· optional · shown as chips on the photo</span></div>
    <div class="grid g2">
      <div class="field"><label>KM Run <span class="opt">· optional</span></label>
        <input type="text" id="km" inputmode="numeric"></div>
      <div class="field"><label>Fuel Type <span class="opt">· optional</span></label>
        <select id="fuel">
          <option value="">— none —</option>
          <option value="Petrol">Petrol</option>
          <option value="Diesel">Diesel</option>
          <option value="EV">EV</option>
          <option value="Hybrid">Hybrid</option>
        </select></div>
    </div>

    <div class="slabel">Contact Numbers</div>
    <div class="grid g2">
      <div class="field"><label>Phone 1 <span class="opt">· required</span></label>
        <input type="tel" id="phone1" inputmode="tel" value="9851351923"></div>
      <div class="field"><label>Phone 2 <span class="opt">· optional</span></label>
        <input type="tel" id="phone2" inputmode="tel" value="9851351926"></div>
    </div>

    <button class="btn-gen" onclick="generatePost()">Generate Post →</button>
  </div>
</div>

<div class="page" id="page2">
  <div class="pc">
    <div class="pactions">
      <button class="btn-back" onclick="goBack()">← Edit</button>
      <button class="btn-dl" id="btnDl" onclick="downloadCurrent()">⬇ Download this</button>
      <button class="btn-dl alt" id="btnDlAll" onclick="downloadAll()">⬇ Download all</button>
      <div class="sizes">
        <button class="sbtn active" onclick="setSize('square',this)">1:1</button>
        <button class="sbtn" onclick="setSize('portrait',this)">4:5</button>
      </div>
    </div>
    <div class="pstrip" id="pstrip"></div>
    <div class="cwrap-outer">
      <div class="cwrap"><canvas id="postCanvas"></canvas></div>
      <div class="canvas-loading" id="canvasLoading">Rendering…</div>
    </div>
  </div>
</div>

<script>

const EMBEDDED_LOGO = "logo.png";

const BANNER   = 'BUY, SALE & EXCHANGE';
const BANNER_TAG = 'BUY, SALE & EXCHANGE';
const PRICE_SUB= 'Negotiable Price';
const LOCATION = 'Sanepa Chowk, Lalitpur';
const WEBSITE  = 'tripathimotors.com';

let uploadedImages = [];
let uploadedLogo   = null;
let currentIndex   = 0;
let currentSize    = 'square';
let fontsReady     = false;
let renderPending  = false;

const SIZES = { square:{w:1080,h:1080}, portrait:{w:1080,h:1350}, story:{w:1080,h:1920} };
const FONT  = "'Montserrat', sans-serif";
const DISPLAY = "'Oswald', sans-serif";

document.fonts.ready.then(()=>{ fontsReady = true; });
setTimeout(()=>{ fontsReady = true; }, 2500);

const fileInput  = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', e=>{ handleFiles(e.target.files); fileInput.value=''; });
uploadZone.addEventListener('dragover', e=>e.preventDefault());
uploadZone.addEventListener('drop', e=>{ e.preventDefault(); handleFiles(e.dataTransfer.files); });

function handleFiles(files){
  [...files].filter(f=>f.type.startsWith('image/')).forEach(f=>{
    loadImg(f,(img,src)=>{ uploadedImages.push({img,src}); renderThumbs(); });
  });
}
function renderThumbs(){
  const box = document.getElementById('thumbs');
  box.innerHTML = uploadedImages.map((it,i)=>
    '<div class="thumb"><img src="'+it.src+'"><span class="num">'+(i+1)+'</span>'+
    '<button class="rm" onclick="removeImg('+i+')">×</button></div>').join('');
}
function removeImg(i){ uploadedImages.splice(i,1); renderThumbs(); }


function loadEmbeddedLogo(){
  if(!EMBEDDED_LOGO) return;
  const img = new Image();
  img.onload  = ()=>{ uploadedLogo = img; };
  img.onerror = ()=>{ console.warn('Embedded logo failed to load — check EMBEDDED_LOGO / that logo.png sits next to index.html.'); };
  img.src = EMBEDDED_LOGO;
}
loadEmbeddedLogo();

function loadImg(file, cb){
  const r = new FileReader();
  r.onload = ev=>{ const img=new Image(); img.onload=()=>cb(img,ev.target.result); img.src=ev.target.result; };
  r.readAsDataURL(file);
}

function generatePost(){
  if(!uploadedImages.length){ alert('Please upload at least one car photo.'); return; }
  const t = document.getElementById('carTitle');
  if(!t.value.trim()){ t.focus(); t.style.borderColor='#2E78EE'; setTimeout(()=>t.style.borderColor='',2000); return; }
  if(!document.getElementById('phone1').value.trim()){
    const p=document.getElementById('phone1'); p.focus(); p.style.borderColor='#2E78EE'; setTimeout(()=>p.style.borderColor='',2000); return; }
  currentIndex = 0;
  document.getElementById('page1').classList.remove('active');
  document.getElementById('page2').classList.add('active');
  renderStrip();
  scheduleRender();
}
function goBack(){
  document.getElementById('page2').classList.remove('active');
  document.getElementById('page1').classList.add('active');
  currentSize='square';
  document.querySelectorAll('.sbtn').forEach((b,i)=>b.classList.toggle('active', i===0));
}
function setSize(size, btn){
  currentSize = size;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  scheduleRender();
}
function renderStrip(){
  const strip = document.getElementById('pstrip');
  if(uploadedImages.length < 2){ strip.innerHTML=''; return; }
  strip.innerHTML = uploadedImages.map((it,i)=>
    '<div class="pthumb'+(i===currentIndex?' active':'')+'" onclick="pickPhoto('+i+')"><img src="'+it.src+'"></div>').join('');
}
function pickPhoto(i){ currentIndex=i; renderStrip(); scheduleRender(); }

function scheduleRender(){
  if(renderPending) return;
  renderPending = true;
  document.getElementById('canvasLoading').classList.add('show');
  document.getElementById('btnDl').disabled = true;
  const exec = ()=>{
    if(!renderPending) return;
    renderPending = false;
    requestAnimationFrame(()=>{ drawCanvas(uploadedImages[currentIndex].img);
      document.getElementById('canvasLoading').classList.remove('show');
      document.getElementById('btnDl').disabled=false; });
  };
  if(fontsReady) setTimeout(exec,60);
  else { document.fonts.ready.then(()=>setTimeout(exec,60)); setTimeout(exec,2600); }
}

function fmtPrice(raw){
  raw=(raw||'').trim();
  if(!raw) return 'Price';
  if(/[a-z]/i.test(raw)) return raw;
  const digits=raw.replace(/[^0-9]/g,'');
  if(!digits) return raw;
  return 'Rs. ' + parseInt(digits,10).toLocaleString('en-IN');
}
function fmtKM(raw){
  raw=(raw||'').trim(); if(!raw) return '';
  if(/[a-z]/i.test(raw)) return raw;
  const digits=raw.replace(/[^0-9]/g,''); if(!digits) return '';
  return parseInt(digits,10).toLocaleString('en-IN')+' km';
}
function livePrice(el){ const f=fmtPrice(el.value); el.value = (f==='Price'?'':f); }

function getData(){
  const v=id=>document.getElementById(id).value.trim();
  const p1=v('phone1'), p2=v('phone2');
  const chips=[]; const km=fmtKM(v('km')), fuel=v('fuel');
  if(km) chips.push(km); if(fuel) chips.push(fuel);
  return {
    title:(v('carTitle')||'Car Title & Model').toUpperCase(),
    price:fmtPrice(v('price')),
    phones:p1 + (p2 ? ', '+p2 : ''),
    chips
  };
}

function rrect(ctx,x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

function fitFont(ctx,text,maxW,startFS,weight,minFS,fam){
  fam=fam||FONT; let fs=startFS; ctx.font=weight+' '+fs+'px '+fam;
  while(fs>minFS && ctx.measureText(text).width>maxW){ fs-=1; ctx.font=weight+' '+fs+'px '+fam; }
  return fs;
}

function footerIcon(ctx,type,cx,cy,sz,color){
  ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color;
  ctx.lineWidth=Math.max(1.6,sz*0.085); ctx.lineCap='round'; ctx.lineJoin='round';
  const x=cx-sz/2, y=cy-sz/2;
  if(type==='phone'){
    rrect(ctx,x+sz*0.26,y+sz*0.04,sz*0.48,sz*0.92,sz*0.12); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,y+sz*0.82,sz*0.05,0,Math.PI*2); ctx.fill();
  } else if(type==='pin'){
    ctx.beginPath();
    ctx.arc(cx,y+sz*0.36,sz*0.30,Math.PI*0.86,Math.PI*0.14,false);
    ctx.lineTo(cx,y+sz*0.96); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,y+sz*0.36,sz*0.11,0,Math.PI*2); ctx.fill();
  } else if(type==='web'){
    ctx.beginPath(); ctx.arc(cx,cy,sz*0.42,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx,cy,sz*0.18,sz*0.42,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-sz*0.42,cy); ctx.lineTo(cx+sz*0.42,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-sz*0.34,cy-sz*0.21); ctx.lineTo(cx+sz*0.34,cy-sz*0.21);
    ctx.moveTo(cx-sz*0.34,cy+sz*0.21); ctx.lineTo(cx+sz*0.34,cy+sz*0.21); ctx.stroke();
  }
  ctx.restore();
}

function drawCanvas(image){
  const canvas = document.getElementById('postCanvas');
  const ctx = canvas.getContext('2d');
  const { w, h } = SIZES[currentSize];
  canvas.width=w; canvas.height=h;

  const wrapper = document.querySelector('.cwrap');
  const wrapW = Math.max(wrapper.clientWidth || 360, 100);
  const dispW = Math.min(wrapW - 52, 520);
  canvas.style.width = Math.round(dispW)+'px';
  canvas.style.height = Math.round(dispW*h/w)+'px';

  const d = getData();
  const PAD = Math.round(w*0.045);

  const topM    = Math.round(h*0.022);
  const headerH = Math.round(h*0.135);
  const footerH = Math.round(h*0.165);
  const headerTop   = topM;
  const titleBottom = headerTop + headerH;
  const footerTop   = h - footerH;
  const photoTop    = titleBottom + Math.round(h*0.014);
  const photoH      = (h - Math.round(footerH*0.95)) - photoTop;  

  const bg = ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#ffffff'); bg.addColorStop(1,'#eef2f8');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
  ctx.letterSpacing='0px';

  ctx.save();
  ctx.beginPath(); ctx.rect(0,photoTop,w,photoH); ctx.clip();
  const iAR=image.width/image.height, sAR=w/photoH;
  let sx,sy,sw,sh;
  if(iAR>sAR){ sh=image.height; sw=sh*sAR; sx=(image.width-sw)/2; sy=0; }
  else       { sw=image.width;  sh=sw/sAR; sx=0; sy=(image.height-sh)/2; }
  ctx.drawImage(image,sx,sy,sw,sh,0,photoTop,w,photoH);
  const scrimH=Math.round(photoH*0.16);
  const scrim=ctx.createLinearGradient(0,footerTop-scrimH,0,footerTop);
  scrim.addColorStop(0,'rgba(8,18,38,0)'); scrim.addColorStop(1,'rgba(8,18,38,0.20)');
  ctx.fillStyle=scrim; ctx.fillRect(0,footerTop-scrimH,w,scrimH);
  ctx.restore();

  const hY=headerTop, hW=w-Math.round(w*0.06);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.letterSpacing=Math.round(w*0.0015)+'px';
  const nameFS=fitFont(ctx,d.title,hW,Math.round(headerH*0.55),'700',20,DISPLAY);
  const nameGrad=ctx.createLinearGradient(0,hY+headerH*0.10,0,hY+headerH*0.62);
  nameGrad.addColorStop(0,'#1F6BE6'); nameGrad.addColorStop(1,'#0A3C8C');
  ctx.font='700 '+nameFS+'px '+DISPLAY;
  ctx.fillStyle=nameGrad;
  ctx.fillText(d.title, w/2, hY+headerH*0.40);
  ctx.letterSpacing='0px';

  const tagFS=Math.round(headerH*0.16);
  ctx.letterSpacing=Math.round(w*0.008)+'px';
  ctx.font='700 '+tagFS+'px '+DISPLAY;
  ctx.fillStyle='#1F5FCC';
  ctx.fillText(BANNER_TAG, w/2, hY+headerH*0.86);
  ctx.letterSpacing='0px';

  const padX=Math.round(w*0.020), padY=Math.round(h*0.010);
  const priceFS=fitFont(ctx,d.price,w*0.40,Math.round(w*0.044),'800',16);
  ctx.font='800 '+priceFS+'px '+FONT; const priceW=ctx.measureText(d.price).width;
  const subFS=Math.round(priceFS*0.40);
  ctx.font='600 italic '+subFS+'px '+FONT; const subW=ctx.measureText(PRICE_SUB).width;
  const badgeW=Math.max(priceW,subW)+padX*2;
  const badgeH=priceFS+subFS*1.25+padY*2;
  const badgeMargin=Math.round(w*0.026);
  const badgeX=w-badgeMargin-badgeW, badgeY=photoTop+Math.round(h*0.013);
  const pGrad=ctx.createLinearGradient(badgeX,badgeY,badgeX+badgeW,badgeY+badgeH);
  pGrad.addColorStop(0,'#2E78EE'); pGrad.addColorStop(1,'#0B449A');
  ctx.save(); ctx.shadowColor='rgba(8,30,70,.40)'; ctx.shadowBlur=badgeH*0.30; ctx.shadowOffsetY=badgeH*0.10;
  ctx.fillStyle=pGrad; rrect(ctx,badgeX,badgeY,badgeW,badgeH,Math.round(badgeH*0.20)); ctx.fill(); ctx.restore();
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.textBaseline='alphabetic'; ctx.font='800 '+priceFS+'px '+FONT;
  ctx.fillText(d.price, badgeX+badgeW/2, badgeY+padY+priceFS*0.86);
  ctx.font='600 italic '+subFS+'px '+FONT; ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.fillText(PRICE_SUB, badgeX+badgeW/2, badgeY+padY+priceFS+subFS*0.95);

  if(d.chips && d.chips.length){
    ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.letterSpacing='0px';
    const chipH=Math.round(h*0.046);
    const chipFS=Math.round(chipH*0.46);
    const chPadX=Math.round(chipH*0.40);
    const dotR=Math.round(chipH*0.10);
    const gap=Math.round(w*0.016);
    const chipY=footerTop - Math.round(footerH*0.46) - chipH;
    let cx=PAD;
    d.chips.forEach(txt=>{
      ctx.font='700 '+chipFS+'px '+FONT;
      const tw=ctx.measureText(txt).width;
      const cw=tw + chPadX*2 + dotR*2 + Math.round(chipH*0.20);
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,.30)'; ctx.shadowBlur=chipH*0.30; ctx.shadowOffsetY=chipH*0.10;
      ctx.fillStyle='rgba(10,22,46,0.60)';
      rrect(ctx,cx,chipY,cw,chipH,chipH/2); ctx.fill();
      ctx.restore();
      ctx.fillStyle='#5BA0FF';
      ctx.beginPath(); ctx.arc(cx+chPadX+dotR, chipY+chipH/2, dotR,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffffff'; ctx.font='700 '+chipFS+'px '+FONT;
      ctx.fillText(txt, cx+chPadX+dotR*2+Math.round(chipH*0.20), chipY+chipH/2+1);
      cx += cw + gap;
    });
  }

 
  const fHx   = Math.round(footerH * 0.95);    
  const fTop  = h - fHx;                      
  const topF  = fTop + Math.round(fHx * 0.075); 
  const apexX = w * 0.555;                       
  const apexY = topF + (h - topF) * 0.34;        
  const Lt = w * 0.45;                           
  const Rt = w * 0.59;                           

  ctx.fillStyle = '#1357C8';
  ctx.fillRect(0, fTop, w, fHx);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, topF, w, h - topF);

  
  ctx.fillStyle = '#1357C8';
  ctx.beginPath();
  ctx.moveTo(Lt, topF);
  ctx.quadraticCurveTo(apexX, topF, apexX, apexY);   
  ctx.quadraticCurveTo(apexX, topF, Rt, topF);      
  ctx.closePath();
  ctx.fill();


  ctx.save();
  ctx.shadowColor = 'rgba(0, 16, 55, 0.32)';
  ctx.shadowBlur = Math.round(w * 0.008);
  ctx.shadowOffsetX = -Math.round(w * 0.005);
  ctx.shadowOffsetY = 0;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(Rt, topF);
  ctx.quadraticCurveTo(apexX, topF, apexX, apexY);                                   
  ctx.quadraticCurveTo(apexX, apexY + (h - apexY) * 0.5, apexX + w * 0.012, h);      
  ctx.lineTo(w, h);                                                                 
  ctx.lineTo(w, topF);                                                             
  ctx.closePath();                                                                  
  ctx.fill();
  ctx.restore();

  const fMid = (topF + h) / 2;
  const leftMaxX = Math.round(w * 0.46);
  const lines = [ {ic:'phone', t:d.phones}, {ic:'pin', t:LOCATION}, {ic:'web', t:WEBSITE} ];
  const lineH = Math.round((h - topF) * 0.62 / 3);
  const icSz = Math.round(lineH * 0.60);
  const txtFS = Math.round(lineH * 0.64);
  const startY = fMid - lineH;
  lines.forEach((ln, i) => {
    const ly = startY + (i * lineH);
    footerIcon(ctx, ln.ic, PAD + icSz / 2, ly, icSz, '#1357C8');
    const tx = PAD + icSz + Math.round(icSz * 0.5);
    const fs = fitFont(ctx, ln.t, leftMaxX - tx, txtFS, '600', 11, DISPLAY);
    ctx.font = '600 ' + fs + 'px ' + DISPLAY;
    ctx.fillStyle = '#1a2436';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(ln.t, tx, ly + 1);
  });

  if (uploadedLogo) {
    const lx0 = Math.round(w * 0.625);
    const lmaxW = (w - Math.round(w * 0.03)) - lx0;
    const lmaxH = Math.round((h - topF) * 0.64);
    const lAR = uploadedLogo.width / uploadedLogo.height;
    let lw, lh;
    if (lAR > lmaxW / lmaxH) { lw = lmaxW; lh = Math.round(lw / lAR); }
    else { lh = lmaxH; lw = Math.round(lh * lAR); }
    ctx.drawImage(uploadedLogo, lx0 + (lmaxW - lw) / 2, fMid - lh / 2, lw, lh);
  }
}

function safeName(){
  return (document.getElementById('carTitle').value.trim().replace(/\s+/g,'_')||'Post').substring(0,40);
}

function canvasToBlob(){
  return new Promise(res=>{
    document.getElementById('postCanvas').toBlob(b=>res(b),'image/png',1.0);
  });
}
function fallbackDownload(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
async function saveBlob(blob, filename){
  if(!blob) return;
  const file = new File([blob], filename, {type:'image/png'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file]}); return; }
    catch(err){ if(err && err.name==='AbortError') return; }
  }
  fallbackDownload(blob, filename);
}
async function downloadCurrent(){
  const suffix = uploadedImages.length>1 ? '_'+(currentIndex+1) : '';
  const blob = await canvasToBlob();
  await saveBlob(blob, 'Tripathi_'+safeName()+suffix+'_'+currentSize+'.png');
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function downloadAll(){
  const btn=document.getElementById('btnDlAll');
  btn.disabled=true; const orig=btn.textContent;

  const files=[];
  for(let i=0;i<uploadedImages.length;i++){
    btn.textContent='Preparing '+(i+1)+'/'+uploadedImages.length+'…';
    drawCanvas(uploadedImages[i].img);
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    const blob=await canvasToBlob();
    if(blob) files.push(new File([blob],
      'Tripathi_'+safeName()+(uploadedImages.length>1?'_'+(i+1):'')+'_'+currentSize+'.png',
      {type:'image/png'}));
  }
  drawCanvas(uploadedImages[currentIndex].img);


  if(files.length && navigator.canShare && navigator.canShare({files})){
    try{ await navigator.share({files}); btn.textContent=orig; btn.disabled=false; return; }
    catch(err){ if(err && err.name==='AbortError'){ btn.textContent=orig; btn.disabled=false; return; } }
  }

  for(let i=0;i<files.length;i++){
    btn.textContent='Saving '+(i+1)+'/'+files.length+'…';
    fallbackDownload(files[i], files[i].name);
    await sleep(550);
  }
  btn.textContent=orig; btn.disabled=false;
}
